<!doctype html>
<html>
  <head>
    <title>AI Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Builder</h1>

      <input id="assistantName" placeholder="AI Name" />
      <input id="assistantDomain" placeholder="AI Role" />

      <textarea id="prompt" placeholder="AI Role Description"></textarea>

      <button onclick="sendPrompt()">Chat</button>

      <pre id="response"></pre>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
      const go = new Go();

      WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject)
        .then((result) => {
          return go.run(result.instance);
        })
        .catch((err) => {
          console.error('Failed to start Go WASM:', err);
        });
    </script>
  </body>
</html>
