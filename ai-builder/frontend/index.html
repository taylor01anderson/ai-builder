<!doctype html>
<html>
  <head>
    <title>AI Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>AI Builder</h1>

      <div class="dashboard">
        <div class="sidebar">
          <h2>Your Assistants</h2>
          <div id="assistantList"></div>
        </div>

        <div class="workspace">
          <h2>Create Assistant</h2>
          <input id="assistantName" placeholder="Assistant Name" />
          <input id="assistantDomain" placeholder="AI Role" />

          <textarea
            id="systemPrompt"
            placeholder="AI Role Description"
          ></textarea>
          <button onclick="createAssistant()">Create</button>

          <hr />

          <h3>Chat</h3>
          <textarea id="chatInput" placeholder="Message your AI"></textarea>
          <button onclick="sendPrompt()">Chat</button>
          <pre id="chatOutput"></pre>
        </div>
      </div>
    </div>

    <script src="wasm_exec.js"></script>
    <script>
      let selectedAssistant = null;

      const go = new Go();

      WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject)
        .then((result) => {
          return go.run(result.instance);
        })
        .catch((err) => {
          console.error('Failed to start Go WASM:', err);
        });

      async function createAssistant() {
        const name = document.getElementById('assistantName').value;

        const prompt = document.getElementById('systemPrompt').value;

        const response = await fetch('http://localhost:8080/api/assistants', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            name: name,
            system_prompt: prompt,
          }),
        });

        const data = await response.json();

        alert('Assistant Created: ' + data.name);

        loadAssistants();
      }

      async function sendPrompt() {
        if (!selectedAssistant) {
          alert('No assistant selected');

          return;
        }

        console.log('SELECTED ASSISTANT:', selectedAssistant);

        const payload = {
          prompt: document.getElementById('chatInput').value,

          assistant_id: selectedAssistant.id,
        };

        try {
          const response = await fetch('http://localhost:8080/api/chat', {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json',
            },

            body: JSON.stringify(payload),
          });

          console.log(JSON.stringify(payload));

          const data = await response.json();

          console.log(data);

          document.getElementById('chatOutput').innerText = JSON.stringify(
            data,
            null,
            2,
          );
        } catch (err) {
          console.error(err);
        }
      }

      async function loadAssistants() {
        const response = await fetch('http://localhost:8080/api/assistants');

        const assistants = await response.json();

        console.log('ASSISTANTS:', assistants);

        const list = document.getElementById('assistantList');

        list.innerHTML = '';

        assistants.forEach((assistant) => {
          console.log('LOADED:', assistant);

          const div = document.createElement('div');

          div.className = 'assistant-card';

          div.innerHTML = `
            <strong>
                ${assistant.name}
            </strong>
        `;

          div.onclick = () => {
            selectedAssistant = assistant;

            console.log('NOW SELECTED:', selectedAssistant);

            document.getElementById('chatOutput').innerText =
              'Loaded: ' + assistant.name;
          };

          list.appendChild(div);
        });
      }
      loadAssistants();
    </script>
  </body>
</html>
